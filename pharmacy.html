<!DOCTYPE html>
<html>
<head>
  <title>Add Pharmacy</title>
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="container">
    <h1>💊 Add Pharmacy</h1>

    <form method="POST" action="/pharmacy">

      <input type="text" name="pharmacy_name" placeholder="Pharmacy Name" required />

      <input type="text" name="location" placeholder="Location" required />

      <input type="text" name="contact_number" placeholder="Contact Number" required />

      <input type="number" name="user_id" placeholder="Enter Pharmacy Owner User ID" required />

      <button type="submit">Save Pharmacy</button>

    </form>
  </div>
</body>
</html>
